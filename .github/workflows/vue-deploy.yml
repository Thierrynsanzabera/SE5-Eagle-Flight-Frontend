name: Deploy dev to AWS

on:
  pull_request:
    types: [closed]
    branches:
      - dev

jobs:
  aws-deploy:
    runs-on: ubuntu-latest
    env:
      VITE_APP_CLIENT_ID: ${{ secrets.VITE_APP_CLIENT_ID }}
      VITE_APP_API_URL: ${{ secrets.VITE_APP_API_URL }}
      VITE_APP_CLIENT_URL: ${{ secrets.VITE_APP_CLIENT_URL }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2
        with:
          ref: dev

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Create environment file
        run: |
          touch eagle-flight/.env
          echo VITE_APP_CLIENT_ID="$VITE_APP_CLIENT_ID" >> eagle-flight/.env
          echo VITE_APP_API_URL="$VITE_APP_API_URL" >> eagle-flight/.env
          echo VITE_APP_CLIENT_URL=flightplan.eaglesoftwareteam.com >> eagle-flight/.env
          echo VITE_APP_SITE_URL=flightplan.eaglesoftwareteam.com >> eagle-flight/.env

      - name: Install dependencies
        run: cd eagle-flight && npm install

      - name: Build project
        run: cd eagle-flight && npm run build

      - name: Bundle project
        run: cd eagle-flight && npm run bundle

      - name: Deploy to Server
        uses: easingthemes/ssh-deploy@v2.1.1
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
          ARGS: '-rltgoDzvO --delete'
          SOURCE: 'eagle-flight/dist/'
          REMOTE_HOST: 'flightplan.eaglesoftwareteam.com'
          REMOTE_USER: ubuntu
          TARGET: '/var/www/html/2025/flight-plan/t3'
